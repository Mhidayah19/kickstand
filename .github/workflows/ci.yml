name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch/PR — saves CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed so we can skip irrelevant jobs.
  # This avoids burning CI minutes when only one app is touched.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
              - '.dockerignore'
            mobile:
              - 'apps/mobile/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  api-lint-and-typecheck:
    name: "API: Lint & Typecheck"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/api

      - name: Typecheck
        run: cd apps/api && npx tsc --noEmit

  api-test:
    name: "API: Test"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov --workspace=apps/api

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

  api-docker-build:
    name: "API: Docker Build"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f apps/api/Dockerfile -t kickstand-api .

  mobile-typecheck:
    name: "Mobile: Typecheck"
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    # TODO: Add mobile lint and test jobs when tests are written
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: cd apps/mobile && npx tsc --noEmit

  mobile-eas-update:
    name: "Mobile: EAS Update"
    needs: [changes, mobile-typecheck]
    if: needs.changes.outputs.mobile == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        working-directory: apps/mobile
        run: eas update --branch default --non-interactive --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_PUBLIC_API_URL: https://kickstand-p2o2.onrender.com
