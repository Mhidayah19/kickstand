<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Manual Implementation based on JSON & Brand Anchors) -->
<header class="flex items-center justify-between px-6 h-16 w-full bg-[#F9F9F9] dark:bg-[#1E1E1E] fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-[#5F5E5E] dark:text-[#C7B299] active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-[5%] text-secondary leading-none">STEP 03</span>
<h1 class="font-headline font-bold tracking-[-2%] text-[#1E1E1E] dark:text-[#F9F9F9] text-lg">Add Machine</h1>
</div>
</div>
<div class="bg-[#C7B299] h-1 w-24 rounded-full self-center"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Progress Bar Section -->
<div class="mb-10">
<div class="flex gap-2 h-1.5 w-full">
<div class="flex-1 rounded-full bg-primary opacity-20"></div>
<div class="flex-1 rounded-full bg-primary opacity-20"></div>
<div class="flex-1 rounded-full bg-primary"></div> <!-- Active 3rd segment -->
<div class="flex-1 rounded-full bg-surface-container-high"></div>
</div>
<p class="text-[11px] font-bold tracking-[5%] text-primary mt-3 uppercase">Machine Specification</p>
</div>
<!-- Form Section -->
<div class="space-y-8">
<!-- Year Input -->
<div class="group">
<label class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-tertiary text-[20px]" data-icon="calendar_today">calendar_today</span>
<span class="font-label text-xs font-bold uppercase tracking-[5%] text-tertiary">Year of Manufacture</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-bold text-on-surface" placeholder="e.g. 2022" type="number"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-secondary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Class Toggle -->
<div class="group">
<div class="flex justify-between items-end mb-3">
<label class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-[20px]" data-icon="license">license</span>
<span class="font-label text-xs font-bold uppercase tracking-[5%] text-tertiary">License Class</span>
</label>
<span class="text-[10px] text-primary/60 font-medium italic">Auto-filled from catalog selection</span>
</div>
<div class="grid grid-cols-3 gap-3 p-1.5 bg-surface-container-low rounded-xl">
<button class="py-3 px-4 rounded-lg font-bold text-sm transition-all hover:bg-surface-container hover:text-primary text-primary/40">2B</button>
<button class="py-3 px-4 rounded-lg font-bold text-sm transition-all bg-primary text-on-primary shadow-lg shadow-primary/20 scale-[1.02]">2A</button>
<button class="py-3 px-4 rounded-lg font-bold text-sm transition-all hover:bg-surface-container hover:text-primary text-primary/40">2</button>
</div>
</div>
<!-- Plate Number -->
<div class="group">
<label class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-tertiary text-[20px]" data-icon="badge">badge</span>
<span class="font-label text-xs font-bold uppercase tracking-[5%] text-tertiary">Plate Number</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-bold text-on-surface uppercase" placeholder="e.g. SBA1234A" type="text"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-secondary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Current Mileage -->
<div class="group">
<label class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-tertiary text-[20px]" data-icon="speed">speed</span>
<span class="font-label text-xs font-bold uppercase tracking-[5%] text-tertiary">Current Mileage (KM)</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-bold text-on-surface" placeholder="e.g. 12000" type="number"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-secondary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>

<div class="mt-12 relative overflow-hidden bg-tertiary-container rounded-[2rem] p-8 min-h-[160px] flex flex-col justify-end">
<div class="absolute top-[-20%] right-[-10%] w-48 h-48 rounded-full bg-secondary-container opacity-40 blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-32 h-32 rounded-full bg-secondary opacity-20 blur-2xl"></div>
<h3 class="font-headline font-bold text-on-tertiary-container text-xl relative z-10 leading-tight">Keep your profile updated for accurate service reminders.</h3>
<p class="text-on-tertiary-container/70 text-sm mt-2 relative z-10">We use these specs to match you with parts.</p>
</div>
</div>

<footer class="fixed bottom-0 left-0 w-full z-50 flex items-center gap-4 bg-[#F9F9F9]/70 dark:bg-[#1E1E1E]/70 backdrop-blur-xl px-6 py-6 shadow-[0_-4px_40px_rgba(30,30,30,0.05)]">

<button class="text-[#5F5E5E] dark:text-[#C7B299] flex items-center justify-center p-3 active:scale-[0.98] transition-transform duration-200 hover:brightness-110">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Primary Action (Active Style: Next Step) -->
<button class="bg-[#F2D06B] text-[#1E1E1E] rounded-xl px-8 py-4 font-bold flex items-center justify-center grow gap-3 active:scale-[0.98] transition-transform duration-200 hover:brightness-110 shadow-lg shadow-[#F2D06B]/20">

</button>
