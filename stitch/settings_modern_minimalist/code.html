<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">

</div>
<div class="text-left">
<p class="font-bold text-on-surface text-sm">Personal Info</p>
<p class="text-xs text-on-surface-variant">Update your account details</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Security -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="shield_lock">shield_lock</span>
</div>

<span class="material-symbols-outlined" data-icon="card_membership">card_membership</span>
</div>
<div class="text-left">
<p class="font-bold text-on-surface text-sm">Subscription</p>
<p class="text-xs text-on-surface-variant">Manage your Pro membership</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>

</div>

<p class="text-center text-[10px] font-bold text-outline-variant tracking-widest uppercase mt-6">Kickstand App v4.2.0</p>
