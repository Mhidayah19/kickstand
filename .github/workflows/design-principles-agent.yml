name: Design Principles Review Agent

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  design-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Codex Design Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/design-principles-review.md
          model: gpt-5.4-mini

      - name: Create Pull Request
        if: steps.codex.outputs.final-message != ''
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "refactor: design principles improvement"
          title: "refactor: automated design principles improvement"
          body: |
            ## Automated Design Principles Review

            This PR was generated by the Codex design principles review agent.

            ### Codex Analysis
            ${{ steps.codex.outputs.final-message }}
          branch: codex/design-review-${{ github.run_number }}
          base: main
