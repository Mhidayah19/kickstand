<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kickstand - New Service Log</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "tertiary-fixed-dim": "#d9c3a9",
              "surface-container-high": "#e8e8e8",
              "surface-container-lowest": "#ffffff",
              "surface-bright": "#f9f9f9",
              "on-secondary-container": "#765e00",
              "on-primary-fixed": "#1b1b1c",
              "background": "#f9f9f9",
              "surface-container-highest": "#e2e2e2",
              "on-secondary-fixed": "#241a00",
              "on-error": "#ffffff",
              "on-tertiary-container": "#534431",
              "primary": "#5f5e5e",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "outline": "#7e766c",
              "surface-variant": "#e2e2e2",
              "primary-container": "#b7b5b4",
              "on-primary-fixed-variant": "#474746",
              "inverse-surface": "#2f3131",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#474746",
              "surface-container": "#eeeeee",
              "secondary": "#735c00",
              "on-tertiary-fixed": "#251909",

              "on-surface-variant": "#4d463d"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#F9F9F9]/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-tertiary-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Mechanic profile portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnak5LgiTUCqE5b-oXZ3sD7Suu38QS_h320VjkFX6h6_Z6O-H0MvY0BBdsghFYPLPaAWWtjf1VafxqequL1dbCLVvRWOKK8nBVGBhPPwJ2nHfyI651cWzFwWnQFLZJLAUdeCiEkLPllmYhIJET1VXuoKcW13GWoxfGRna6YQKaBmYs6VUjcpzwc-cSv7itBreFXD0joxE67qX8lQ36Szw2cluN70505l1Rw-ATlHHdfrfnmHW9p67Vp96rKoL2yrLz8eQjgHuj-hTd"/>
</div>
<span class="font-headline font-bold tracking-widest uppercase text-sm text-[#1E1E1E]">PRECISION ATELIER</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#5F5E5E] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Header Section -->
<div class="mb-10">
<div class="inline-block bg-secondary px-3 py-1 rounded-full mb-3">
<span class="text-[10px] font-bold tracking-[0.2em] text-on-secondary uppercase">Workshop v2.4</span>
</div>
<h1 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface">New Service Log</h1>
<p class="text-on-surface-variant mt-2 font-medium">Capture precision maintenance details for the Ducati Panigale V4.</p>
</div>
<section class="space-y-8">
<!-- Service Type Selection -->
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Service Type</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-on-background text-surface font-bold text-sm transition-all border-none">Oil Change</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-bold text-sm hover:bg-surface-container-highest transition-all border-none">Chain Adjustment</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-bold text-sm hover:bg-surface-container-highest transition-all border-none">Brake Flush</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-bold text-sm hover:bg-surface-container-highest transition-all border-none">Desmo Service</button>
</div>
</div>
<!-- Bento Form Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Mileage -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-2">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Mileage</label>
<div class="flex items-end gap-2">
<input class="w-full bg-transparent border-none p-0 text-2xl font-bold focus:ring-0 placeholder:text-outline-variant" placeholder="12,450" type="number"/>
<span class="text-sm font-bold text-on-surface-variant pb-1">KM</span>
</div>
</div>
<!-- Date -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-2">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Service Date</label>
<input class="w-full bg-transparent border-none p-0 text-xl font-bold focus:ring-0 text-on-surface" type="date" value="2023-11-24"/>
</div>
<!-- Estimated Cost -->
<div class="bg-tertiary-container/30 p-6 rounded-xl space-y-2 relative overflow-hidden">
<div class="absolute -right-4 -bottom-4 w-24 h-24 bg-tertiary-container/20 rounded-full blur-2xl"></div>
<label class="block text-xs font-bold tracking-[0.15em] text-on-tertiary-container uppercase">Estimated Cost</label>
<div class="flex items-center gap-1">
<span class="text-xl font-bold text-on-tertiary-container">$</span>
<input class="w-full bg-transparent border-none p-0 text-2xl font-bold focus:ring-0 placeholder:text-on-tertiary-container/40" placeholder="450.00" type="number"/>
</div>
</div>
<!-- Service ID -->
<div class="bg-surface-container-low p-6 rounded-xl space-y-2">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Service ID</label>
<input class="w-full bg-transparent border-none p-0 text-xl font-bold focus:ring-0 text-on-surface-variant uppercase" type="text" value="KS-992-X"/>
</div>
</div>
<!-- Notes -->
<div class="space-y-4">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Service Notes</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-5 text-on-surface font-medium focus:ring-2 focus:ring-secondary/50 placeholder:text-outline-variant resize-none" placeholder="Describe mechanical adjustments, parts replaced, or upcoming issues..." rows="4"></textarea>
</div>
<!-- Documentation Section -->
<div class="space-y-6">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold tracking-[0.15em] text-on-surface-variant uppercase">Evidence &amp; Documentation</label>
<span class="text-[10px] font-bold text-secondary">2 FILES ATTACHED</span>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- Photo Preview -->
<div class="aspect-square rounded-xl overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="Motorcycle brake assembly detail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsrEpOfBmDTsLfGMndpWvSFrdDf7iHqZawwMkApD0E4WXYQaTkd4c6EgODtxGB067cUmMjnrk_-AYfo91sRH2IInjQpfF9qi7sh1aju6NYeC47fqfGf1m-Gxf73dPOkQJiWAxdlgwVXmw6YT_cbVO4ylyA0g4jl7C8T4dNjfxoVYqS-E3CxQhJPufG15ad_W4pjotk-5saxzdD9D0hXIAau0UGhaYdlW3LuVdn-HNvwFXuddC8gjNs-xctejqKGXh7Wtv37kf2zrsj"/>
<div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
<button class="bg-white/20 backdrop-blur-md p-2 rounded-full text-white">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<!-- Upload Placeholder -->
<button class="aspect-square rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-2 hover:border-secondary hover:bg-secondary/5 transition-all text-on-surface-variant hover:text-secondary">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Add Media</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full bg-[#1E1E1E] text-white py-6 rounded-2xl flex items-center justify-center gap-4 group hover:bg-black transition-all active:scale-[0.98] duration-150">
<span class="text-lg font-bold tracking-widest uppercase">Save Log</span>
<div class="w-10 h-10 bg-[#F2D06B] rounded-full flex items-center justify-center text-[#1E1E1E] group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-between items-center mx-auto bg-[#1E1E1E]/80 backdrop-blur-2xl rounded-[2rem] px-8 py-3 w-[90%] max-w-md shadow-[0_20px_40px_rgba(0,0,0,0.1)]">
<button class="text-[#C7B299] p-3 hover:text-[#F2D06B] transition-all active:scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="home_repair_service">home_repair_service</span>
</button>
<button class="text-[#C7B299] p-3 hover:text-[#F2D06B] transition-all active:scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="sports_motorsports">sports_motorsports</span>
</button>
<button class="bg-[#F2D06B] text-[#1E1E1E] rounded-full p-3 scale-110 shadow-[0_0_15px_rgba(242,208,107,0.4)] active:scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</button>
<button class="text-[#C7B299] p-3 hover:text-[#F2D06B] transition-all active:scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
</body></html>
