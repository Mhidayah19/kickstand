<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#f9f9f9",
              "primary-fixed-dim": "#c8c6c5",
              "outline": "#7e766c",
              "on-tertiary-fixed-variant": "#534431",
              "on-tertiary": "#ffffff",
              "secondary": "#735c00",
              "tertiary": "#6c5c47",
              "secondary-fixed-dim": "#e5c360",
              "inverse-primary": "#c8c6c5",
              "outline-variant": "#d0c5ba",
              "on-secondary-container": "#765e00",
              "on-surface": "#1a1c1c",
              "primary-container": "#b7b5b4",
              "on-tertiary-fixed": "#251909",
              "on-error": "#ffffff",
              "inverse-surface": "#2f3131",
              "background": "#f9f9f9",
              "secondary-fixed": "#ffe088",
              "tertiary-container": "#c7b299",
              "surface-container-high": "#e8e8e8",
              "surface-variant": "#e2e2e2",
              "error": "#ba1a1a",
              "surface-tint": "#5f5e5e",
              "primary-fixed": "#e5e2e1",
              "on-secondary-fixed-variant": "#574500",
              "on-error-container": "#93000a",
              "inverse-on-surface": "#f1f1f1",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#474746",
              "primary": "#5f5e5e",
              "on-background": "#1a1c1c",
              "error-container": "#ffdad6",
              "surface-dim": "#dadada",
              "surface-container-low": "#f3f3f3",
              "on-secondary-fixed": "#241a00",
              "surface-container-highest": "#e2e2e2",
              "surface-bright": "#f9f9f9",
              "on-primary-fixed": "#1b1b1c",
              "on-surface-variant": "#4d463d",
              "surface-container": "#eeeeee",
              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#fcda74",
              "tertiary-fixed-dim": "#d9c3a9",
              "on-tertiary-container": "#534431",
              "tertiary-fixed": "#f6dfc4",
              "on-primary-container": "#474746"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-abstract-geometry {
            background: radial-gradient(circle at 20% 30%, #C7B299 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #F2D06B 0%, transparent 50%);
            opacity: 0.15;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col overflow-hidden">
<!-- Suppressed Navigation: Onboarding Focus -->
<main class="flex-1 flex flex-col relative">
<!-- Abstract Background Decorative Layer -->
<div class="absolute inset-0 z-0 bg-abstract-geometry pointer-events-none"></div>
<!-- Large Asymmetric Shape -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-tertiary-container/20 rounded-full blur-3xl z-0"></div>
<div class="relative z-10 flex-1 flex flex-col px-6 pt-16 pb-8">
<!-- Branding/Identity -->
<div class="mb-12">
<span class="font-headline font-extrabold text-2xl tracking-[-2%] text-on-surface">PRECISION ATELIER</span>
</div>
<!-- Content Section: Editorial Typography -->
<div class="max-w-md">
<h1 class="font-headline font-bold text-5xl leading-[1.1] tracking-tight text-on-surface mb-6">
                    Manage Your Fleet.
                </h1>
<p class="text-on-surface-variant text-lg font-medium leading-relaxed mb-12">
                    Monitor the health and vitals of all your machines in one centralized atelier.
                </p>
</div>
<!-- Visual Preview: Motorcycle Cards Bento Style -->
<div class="flex-1 grid grid-cols-6 grid-rows-6 gap-4 mb-12">
<!-- Main Card -->
<div class="col-span-4 row-span-4 bg-surface-container-lowest rounded-xl p-5 shadow-[0_4px_40px_rgba(199,178,153,0.06)] flex flex-col justify-between border border-outline-variant/10">
<div class="flex justify-between items-start">
<div class="space-y-1">
<span class="text-[10px] font-bold tracking-[5%] uppercase text-primary opacity-60">Fleet ID: 092</span>
<h3 class="font-headline font-bold text-xl">NORDEN 901</h3>
</div>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">motorcycle</span>
</div>
<div class="mt-4 flex flex-col gap-2">
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-secondary w-3/4"></div>
</div>
<div class="flex justify-between text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">
<span>Service Status</span>
<span>Optimal</span>
</div>
</div>
</div>
<!-- Secondary Visual Element -->
<div class="col-span-2 row-span-3 bg-inverse-surface rounded-xl p-4 flex flex-col justify-center items-center text-center">
<span class="text-secondary-fixed-dim font-headline font-bold text-2xl tracking-tighter">98%</span>
<span class="text-[9px] uppercase tracking-widest text-surface-container-low font-bold mt-1">Efficiency</span>
</div>
<!-- Abstract Decorative Card -->
<div class="col-span-2 row-span-3 bg-tertiary-container rounded-xl flex items-center justify-center overflow-hidden relative">
<div class="absolute inset-0 opacity-40">
<div class="w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
</div>
<span class="material-symbols-outlined text-on-tertiary-container text-3xl">analytics</span>
</div>
<!-- Small Technical Card -->
<div class="col-span-4 row-span-2 bg-secondary-container rounded-xl p-4 flex items-center justify-between">
<div>
<div class="text-[10px] font-bold tracking-widest uppercase text-on-secondary-container opacity-70">Active Garage</div>
<div class="font-bold text-on-secondary-container">The Warehouse Dist.</div>
</div>
<span class="material-symbols-outlined text-on-secondary-container">location_on</span>
</div>
</div>
<!-- Bottom Action Area -->
<div class="mt-auto space-y-8">
<!-- Progress Dots -->
<div class="flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant opacity-40"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant opacity-40"></div>
<div class="w-8 h-2 rounded-full bg-secondary"></div>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4">
<button class="w-full bg-secondary text-on-secondary font-headline font-bold py-5 rounded-full text-lg shadow-lg active:scale-95 transition-all duration-200 uppercase tracking-widest flex items-center justify-center gap-2">
                        Finish
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full text-on-surface-variant font-bold py-2 text-sm uppercase tracking-widest hover:text-on-surface transition-colors">
                        Skip Overview
                    </button>
</div>
</div>
</div>
</main>
<!-- Background Elements (Layered) -->
<div class="fixed bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-tertiary-container/10 to-transparent pointer-events-none -z-10"></div>
</body></html>
