<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 800" role="img" aria-label="Kickstand AWS architecture diagram">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap");
      text { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1A1A1A"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C9A442"/>
    </marker>

    <symbol id="i-mobile" viewBox="0 0 24 24">
      <rect x="6" y="2" width="12" height="20" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <line x1="6" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="12" cy="19" r="0.8" fill="currentColor"/>
    </symbol>
    <symbol id="i-cicd" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <polygon points="10,8 10,16 17,12" fill="currentColor"/>
    </symbol>
    <symbol id="i-registry" viewBox="0 0 24 24">
      <rect x="3" y="6" width="18" height="4" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
