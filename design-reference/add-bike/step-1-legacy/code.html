<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Machine | Kickstand</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eeeeee",
              "surface": "#f9f9f9",
              "secondary-fixed": "#ffe088",
              "secondary-container": "#fcda74",
              "on-secondary-fixed-variant": "#574500",
              "tertiary-fixed-dim": "#d9c3a9",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#241a00",
              "surface-container-highest": "#e2e2e2",
              "on-surface": "#1a1c1c",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#f6dfc4",
              "on-tertiary-fixed": "#251909",
              "secondary-fixed-dim": "#e5c360",
              "on-surface-variant": "#4d463d",
              "outline": "#7e766c",
              "primary-fixed-dim": "#c8c6c5",
              "surface-container-high": "#e8e8e8",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#474746",
              "on-primary-container": "#474746",
              "error": "#ba1a1a",
              "tertiary-container": "#c7b299",
              "on-tertiary": "#ffffff",
              "surface-variant": "#e2e2e2",
              "on-error": "#ffffff",
              "inverse-on-surface": "#f1f1f1",
              "background": "#f9f9f9",
              "outline-variant": "#d0c5ba",
              "surface-bright": "#f9f9f9",
              "surface-tint": "#5f5e5e",
              "tertiary": "#6c5c47",
              "surface-dim": "#dadada",
              "on-secondary-container": "#765e00",
              "primary": "#5f5e5e",
              "on-tertiary-container": "#534431",
              "error-container": "#ffdad6",
              "secondary": "#735c00",
              "on-background": "#1a1c1c",
              "inverse-primary": "#c8c6c5",
              "surface-container-low": "#f3f3f3",
              "on-primary-fixed": "#1b1b1c",
              "inverse-surface": "#2f3131",
              "primary-container": "#b7b5b4",
              "on-error-container": "#93000a",
              "primary-fixed": "#e5e2e1",
              "on-tertiary-fixed-variant": "#534431"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-bg {
            background-image: radial-gradient(circle at 2px 2px, #C7B299 1px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#F9F9F9]/70 backdrop-blur-xl shadow-sm shadow-[#C7B299]/5 flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-[#5F5E5E] hover:bg-[#C7B299]/20 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-xl text-[#1E1E1E]">Add New Machine</h1>
</div>
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-[10px] font-bold text-on-tertiary-container border-2 border-surface">
            JS
        </div>
</header>
<main class="flex-1 mt-20 px-6 pb-32 max-w-2xl mx-auto w-full relative">
<!-- Technical Background Decoration -->
<div class="fixed inset-0 precision-bg pointer-events-none"></div>
<!-- Progress Indicator -->
<div class="flex gap-2 mb-8">
<div class="h-1 flex-1 bg-secondary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Section 1: Brand Search -->
<section class="mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase bg-primary text-on-primary px-2 py-0.5 rounded">Step 01</span>
<h2 class="text-2xl font-headline font-bold tracking-tight">Select Brand</h2>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 focus:ring-0 focus:bg-surface-container-highest transition-colors font-medium" placeholder="Search brands (e.g. Ducati, Triumph)" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 group-focus-within:w-full bg-secondary transition-all duration-300"></div>
</div>
<!-- Brand Quick Picks (Asymmetric Layout) -->
<div class="mt-6 grid grid-cols-2 sm:grid-cols-3 gap-3">
<button class="bg-surface-container-low hover:bg-tertiary-container/20 p-4 rounded-xl flex flex-col items-center gap-2 transition-all border border-transparent hover:border-tertiary-container/30">
<div class="w-12 h-12 rounded-full bg-surface flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="motorcycle">motorcycle</span>
</div>
<span class="text-sm font-bold tracking-tight">Ducati</span>
</button>
<button class="bg-surface-container-low hover:bg-tertiary-container/20 p-4 rounded-xl flex flex-col items-center gap-2 transition-all border border-transparent hover:border-tertiary-container/30">
<div class="w-12 h-12 rounded-full bg-surface flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="settings_input_component">settings_input_component</span>
</div>
<span class="text-sm font-bold tracking-tight">Triumph</span>
</button>
<button class="bg-surface-container-low hover:bg-tertiary-container/20 p-4 rounded-xl flex flex-col items-center gap-2 transition-all border border-transparent hover:border-tertiary-container/30">
<div class="w-12 h-12 rounded-full bg-surface flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="build">build</span>
</div>
<span class="text-sm font-bold tracking-tight">BMW</span>
</button>
</div>
</section>
<!-- Section 2: Model Name -->
<section class="mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase bg-surface-container-highest text-primary px-2 py-0.5 rounded">Step 02</span>
<h2 class="text-2xl font-headline font-bold tracking-tight">Model Name</h2>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 focus:ring-0 focus:bg-surface-container-highest transition-colors font-medium" placeholder="Enter model (e.g. Scrambler, Street Triple)" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 group-focus-within:w-full bg-secondary transition-all duration-300"></div>
</div>
<p class="mt-2 text-xs text-outline font-medium">Tip: Specific models help us find better parts.</p>
</section>
<!-- Section 3: VIN -->
<section class="mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="text-[10px] font-bold tracking-[0.1em] uppercase bg-surface-container-highest text-primary px-2 py-0.5 rounded">Step 03</span>
<h2 class="text-2xl font-headline font-bold tracking-tight">VIN Identification</h2>
</div>
<div class="bg-tertiary-container/10 p-6 rounded-2xl relative overflow-hidden mb-6">
<!-- Abstract geometry -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
<div class="relative z-10">
<div class="flex items-center justify-between mb-4">
<label class="text-[11px] font-bold uppercase tracking-[0.15em] text-primary">Vehicle Identification Number</label>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="info">info</span>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 px-4 focus:ring-0 font-mono tracking-widest uppercase" placeholder="17-Digit Alpha-numeric code" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 group-focus-within:w-full bg-secondary transition-all duration-300"></div>
</div>
</div>
</div>
<!-- Scanner Option (High-end UI pattern) -->
<button class="w-full flex items-center justify-center gap-3 py-4 border-2 border-dashed border-outline-variant rounded-xl text-primary font-bold hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
<span>Scan VIN from Registration</span>
</button>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-md z-50">
<div class="max-w-2xl mx-auto flex items-center gap-4">
<button class="flex-1 bg-secondary text-on-secondary-fixed py-4 rounded-xl font-bold tracking-tight shadow-lg shadow-secondary/20 hover:opacity-90 active:translate-y-0.5 transition-all flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</body></html>
