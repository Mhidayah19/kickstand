<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .asymmetric-shape {
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 0% 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#4d463d",
                        "on-primary-container": "#474746",
                        "on-surface": "#1a1c1c",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9f9",
                        "on-error": "#ffffff",
                        "outline": "#7e766c",
                        "surface-bright": "#f9f9f9",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#f6dfc4",
                        "primary-container": "#b7b5b4",
                        "background": "#f9f9f9",
                        "secondary-fixed": "#ffe088",
                        "surface-container-high": "#e8e8e8",
                        "inverse-on-surface": "#f1f1f1",
                        "on-background": "#1a1c1c",
                        "secondary": "#735c00",
                        "on-tertiary-fixed-variant": "#534431",
                        "tertiary": "#6c5c47",
                        "inverse-primary": "#c8c6c5",
                        "primary-fixed": "#e5e2e1",
                        "on-tertiary-container": "#534431",
                        "surface-variant": "#e2e2e2",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed-variant": "#574500",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#d9c3a9",
                        "tertiary-container": "#c7b299",
                        "surface-tint": "#5f5e5e",
                        "surface-container-low": "#f3f3f3",
                        "error": "#ba1a1a",
                        "primary": "#5f5e5e",
                        "on-tertiary-fixed": "#251909",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#241a00",
                        "on-secondary-container": "#765e00",
                        "outline-variant": "#d0c5ba",
                        "on-primary-fixed-variant": "#474746",
                        "surface-dim": "#dadada",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#fcda74",
                        "on-primary-fixed": "#1b1b1c",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed-dim": "#e5c360"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar - SUPPRESSED: Page intent is Transactional/Onboarding -->
<main class="flex-grow flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Abstract Geometry -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 rounded-full bg-tertiary-container opacity-20 blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-96 h-96 rounded-full bg-secondary-container opacity-10 blur-3xl"></div>
<!-- Main Signup Canvas -->
<div class="w-full max-w-md z-10">
<!-- Branding Header -->
<div class="mb-12 text-left">
<div class="inline-flex items-center justify-center bg-primary p-2 rounded-xl mb-6">
<span class="material-symbols-outlined text-secondary-container" style="font-variation-settings: 'FILL' 1;">pedal_bike</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-on-surface uppercase mb-2">SHIFTED</h1>
<p class="text-primary font-medium tracking-tight">Precision built for the modern rider.</p>
</div>
<!-- Form Container -->
<div class="space-y-6">
<!-- Name Field -->
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-primary mb-2 px-1">Full Name</label>
<div class="relative transition-all duration-200">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-medium" placeholder="Wrench Master" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Email Field -->
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-primary mb-2 px-1">Email Address</label>
<div class="relative transition-all duration-200">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-medium" placeholder="mechanic@shifted.app" type="email"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-primary mb-2 px-1">Secure Password</label>
<div class="relative transition-all duration-200">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-secondary-container hover:bg-secondary-fixed text-on-secondary-container font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-secondary-container/10 group">
<span>Create Account</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Login Link -->
<div class="text-center pt-4">
<p class="text-on-surface-variant text-sm font-medium">
                        Already have an account? 
                        <a class="text-secondary font-bold hover:underline underline-offset-4 ml-1" href="#">Login</a>
</p>
</div>
</div>
<!-- Precision Badge -->
<div class="mt-12 flex justify-center">
<div class="bg-primary-fixed px-3 py-1 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-[0.05em] text-on-primary-fixed-variant">System Secured • V.24.4</span>
</div>
</div>
</div>
<!-- Editorial Graphic Component -->
<div class="hidden lg:block absolute right-0 top-0 h-full w-1/3 bg-tertiary-container/30 asymmetric-shape -z-10">
<div class="absolute inset-0 flex items-center justify-center p-12">
<div class="relative w-full h-full rounded-[2rem] overflow-hidden border-[12px] border-surface shadow-2xl">
<img class="w-full h-full object-cover" data-alt="Close up high quality mechanical bicycle parts and chain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7AoDlg-cPPvAuyptterKQGcXEXOixP6y1IuuYdEtN_yQY1zuMfylITU7vuluaxiLpYl05oOXltyZJux9Qcc7Zd1QibILgA7OfauH8WKLWTnP1J4v48_Ydl6Bz-WBswpkp7mYGEDkJmyZAgD8MiHraKIo37H6RTzgY02ZiiQwuVctfe_C3UadmNkbirO8tcFftB8MN9SwoRbVVs1c2SqHnnIH_3VW3vnPY4Iuw0g5iCt-kuYaVgCWIcms5maXqSoBVs34iCRXhntXP"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent flex flex-col justify-end p-8">
<h2 class="text-white text-3xl font-extrabold tracking-tighter uppercase mb-2">Build your legacy.</h2>
<p class="text-surface/80 text-sm font-medium">Join 50k+ mechanics worldwide optimizing their workflow with Shifted.</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar - SUPPRESSED: Page intent is Transactional -->
</body></html>
