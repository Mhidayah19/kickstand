<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kickstand — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F4F2EC;
    --paper-2: #EBE8DF;
    --ink: #1A1A1A;
    --muted: #7A756C;
    --soft: #9A9388;
    --rule: rgba(26,26,26,0.09);
    --rule-solid: rgba(26,26,26,0.16);
    --accent: #F2D06B;
    --accent-deep: #C9A442;
    --accent-tint: rgba(242,208,107,0.14);
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    padding: 64px 48px 80px;
  }
  .header { max-width: 1320px; margin: 0 auto 32px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight: 500;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 44px;
    letter-spacing: -0.01em;
    line-height: 1.05;
    margin: 0 0 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    max-width: 64ch;
    margin: 0;
  }
  .diagram { max-width: 1320px; margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; }
  .footer {
    max-width: 1320px;
    margin: 32px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header class="header">
  <p class="eyebrow">SYSTEM · KICKSTAND</p>
  <h1>App to AWS architecture</h1>
  <p class="subtitle">NestJS API on a single Amazon ECS task in <span style="font-family:var(--mono); font-size:12px;">ap-southeast-1a</span>. Direct EC2 public-IP ingress, no load balancer. Reflects the live cluster as of <span style="font-family:var(--mono); font-size:12px;">2026-05</span>.</p>
</header>
