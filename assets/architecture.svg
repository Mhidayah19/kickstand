      <path d="M 8 11 V 8 a 4 4 0 0 1 8 0 V 11" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="12" cy="16" r="1.2" fill="currentColor"/>
    </symbol>
    <symbol id="i-logs" viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.5"/>
      <line x1="4" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.5"/>
      <line x1="4" y1="14" x2="20" y2="14" stroke="currentColor" stroke-width="1.5"/>
      <line x1="4" y1="18" x2="11" y2="18" stroke="currentColor" stroke-width="1.5"/>
    </symbol>
    <symbol id="i-server" viewBox="0 0 24 24">
